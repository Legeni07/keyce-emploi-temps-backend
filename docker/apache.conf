<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Bloquer l'accès direct aux dossiers sensibles
    <DirectoryMatch "^/var/www/html/(config|middleware|utils|sql|docker)">
        Require all denied
    </DirectoryMatch>

    ErrorLog  ${APACHE_LOG_DIR}/keyce_error.log
    CustomLog ${APACHE_LOG_DIR}/keyce_access.log combined
</VirtualHost>
